<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <title>Library</title>
  </head>
  <body>
    <header>
      <h1 class="main-title title">My Library</h1>
      <button class="new-book-btn">New Book</button>
    </header>
    <main>
      <div class="library-container">
        <div class="book">
          <button class="read">READ</button>
          <h2 class="title">The Hobbit</h2>
          <p>Author: J.R.R Tolkien</p>
          <p>Pages: 295</p>
          <button class="remove-btn">Remove</button>
        </div>
      </div>
    </main>

  </body>
</html>
