<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <title>Library</title>
  </head>
  <body>
    <header>
      <h1 class="main-title title">My Library</h1>
      <button class="new-book-btn">New Book</button>
    </header>
    <main>
      <div class="library-container"></div>
    </main>

    <dialog class="book-modal">
      <form class="book-form" method="dialog">
        <h2 class="book-form-title">Add a new book</h2>
        <div class="form-group">
          <label for="book-title">Title:</label>
          <input type="text" id="book-title" name="Title" required>
        </div>
        <div class="form-group">
          <label for="book-author">Author:</label>
          <input type="text" id="book-author" name="Author" required>
        </div>
        <div class="form-group">
          <label for="number-pages">No of pages:</label>
          <input type="number" id="number-pages" name="Pages" required>
        </div>
        <div class="form-group checkbox-group">
          <label for="isRead">I have read this book</label>
          <input type="checkbox" id="isRead" name="read-status">
        </div>
        <div class="form-buttons">
          <button class="add-button">Add Book</button>
          <button class="cancel-button">Cancel</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
